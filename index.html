<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CS Department Report Summarizer</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:system-ui,sans-serif;background:#f0f2f8;min-height:100vh;padding:24px 16px;color:#111;}
  .container{max-width:820px;margin:0 auto;}
  .header{margin-bottom:24px;}
  .header h1{font-size:24px;font-weight:800;color:#1a2e5a;}
  .header p{font-size:13px;color:#888;margin-top:4px;}
  .card{background:#fff;border:1px solid #dde;border-radius:12px;padding:20px;margin-bottom:20px;}
  label{font-size:13px;font-weight:600;display:block;margin-bottom:5px;}
  input[type=text]{padding:9px 12px;border-radius:7px;border:1px solid #ccd;font-size:13px;width:200px;}
  textarea{width:100%;min-height:200px;font-family:monospace;font-size:12px;padding:10px;border-radius:8px;border:1px solid #ccd;resize:vertical;}
  .hint{font-size:12px;color:#888;margin-top:5px;}
  .ok{color:#2a8a2a;}
  .err{color:#c44;font-size:13px;margin-top:8px;}
  .btn-primary{margin-top:14px;padding:11px 28px;border-radius:8px;border:none;background:#1a2e5a;color:#fff;font-weight:700;font-size:14px;cursor:pointer;}
  .btn-secondary{padding:8px 16px;border-radius:7px;border:1px solid #ccd;background:#f7f8fc;cursor:pointer;font-size:13px;}
  .export-bar{background:#f0f4ff;border:1px solid #c5cfee;border-radius:10px;padding:14px 16px;margin-bottom:20px;}
  .export-bar h3{font-weight:700;font-size:13px;color:#1a2e5a;margin-bottom:6px;}
  .export-note{font-size:11px;color:#778;margin-bottom:10px;font-style:italic;}
  .export-btns{display:flex;flex-wrap:wrap;gap:10px;}
  .exp-btn{display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;border:1px solid #ccd;background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:#333;}
  .exp-btn:hover{background:#f0f4ff;}
  .exp-btn.primary-export{background:#1a2e5a;color:#fff;border-color:#1a2e5a;}
  .exp-btn.primary-export:hover{background:#162448;}
  .section{margin-bottom:20px;border:1px solid #dde;border-radius:10px;overflow:hidden;}
  .sec-header{background:#1a2e5a;color:#fff;padding:10px 16px;font-weight:700;font-size:14px;}
  .sec-body{padding:14px 16px;background:#fff;}
  .row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f0f0f0;}
  .row .lbl{font-size:13px;color:#222;}
  .row .val{font-weight:700;font-size:13px;text-align:right;padding-left:16px;}
  .row.indent .lbl{padding-left:16px;color:#555;}
  .subhead{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;margin:10px 0 4px;}
  .client-item{font-size:13px;padding:2px 0;border-bottom:1px solid #f5f5f5;}
  .client-item span{color:#888;}
  .none{font-size:13px;color:#999;}
  .summary-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
  .summary-header h2{font-size:16px;font-weight:700;color:#1a2e5a;}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>CS Department Report Summarizer</h1>
    <p>Paste your report CSV → instantly generate your meeting summary</p>
  </div>

  <div id="inputPanel" class="card">
    <div style="display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap;align-items:flex-end;">
      <div>
        <label for="reportDate">Report Date</label>
        <input type="text" id="reportDate" placeholder="e.g. 3/1/2026"/>
      </div>
      <div style="font-size:12px;color:#888;padding-bottom:10px;">Used to determine which renewals &amp; terminations are current</div>
    </div>
    <label for="csvInput">Paste Report Data
      <span style="font-weight:400;color:#888;margin-left:8px;">(Excel: select all including headers → Ctrl+C → Ctrl+V below)</span>
    </label>
    <textarea id="csvInput" placeholder="Paste your CSV or tab-separated data here, including the header row..."></textarea>
    <div id="detectHint" class="hint"></div>
    <div id="errorMsg" class="err"></div>
    <button class="btn-primary" onclick="generate()">⚡ Generate Summary</button>
  </div>

  <div id="summaryPanel" style="display:none;">
    <div class="summary-header">
      <h2 id="summaryTitle">Summary</h2>
      <button class="btn-secondary" onclick="reset()">← New Report</button>
    </div>
    <div class="export-bar">
      <h3>📤 Export / Save Options</h3>
      <div class="export-note">💡 All files download directly — open TSV in Excel/Sheets, open the PDF file in your browser to print.</div>
      <div class="export-btns">
        <button class="exp-btn" onclick="downloadText()">📄 Download as Text</button>
        <button class="exp-btn" onclick="downloadTable()">📊 Download as Table (Sheets/Excel)</button>
        <button class="exp-btn primary-export" onclick="downloadCSV()">⬇️ Download CSV</button>
        <button class="exp-btn primary-export" onclick="downloadPDF()">🖨 Download as PDF</button>
      </div>
    </div>
    <div id="summaryContent"></div>
  </div>
</div>

<script>
var G = null;
var G_date = "";

// ── CSV Parser ────────────────────────────────────────────────────────────────
function parseCSV(text) {
  if (!text || !text.trim()) return {headers:[], rows:[]};
  var lines = text.trim().split(/\r?\n/);
  var headers = splitLine(lines[0]);
  var rows = [];
  for (var i = 1; i < lines.length; i++) {
    var vals = splitLine(lines[i]);
    var obj = {};
    for (var j = 0; j < headers.length; j++) {
      obj[headers[j].trim()] = (vals[j] || "").trim();
    }
    var hasVal = false;
    for (var k in obj) { if (obj[k]) { hasVal = true; break; } }
    if (hasVal) rows.push(obj);
  }
  return {headers: headers, rows: rows};
}

function splitLine(line) {
  var vals = [], cur = "", inQ = false;
  for (var i = 0; i < line.length; i++) {
    var c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if ((c === ',' || c === '\t') && !inQ) { vals.push(cur.trim().replace(/^"|"$/g,"")); cur = ""; }
    else { cur += c; }
  }
  vals.push(cur.trim().replace(/^"|"$/g,""));
  return vals;
}

function fv(row) {
  var keys = Array.prototype.slice.call(arguments, 1);
  for (var ki = 0; ki < keys.length; ki++) {
    var k = keys[ki].toLowerCase();
    var rowKeys = Object.keys(row);
    for (var ri = 0; ri < rowKeys.length; ri++) {
      if (rowKeys[ri].toLowerCase().indexOf(k) !== -1 && row[rowKeys[ri]]) {
        return row[rowKeys[ri]];
      }
    }
  }
  return "";
}

function pd(s) {
  if (!s) return null;
  var d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
}

function isActive(row) {
  var s = fv(row, "Client Status", "status").toLowerCase();
  return s.indexOf("active") !== -1 && s.indexOf("inactive") === -1;
}

// ── Analysis ──────────────────────────────────────────────────────────────────
function analyze(rows, reportDate) {
  var ref = pd(reportDate) || new Date();
  var rm = ref.getMonth();
  var ry = ref.getFullYear();

  // Active clients only (excludes inactive)
  var activeRows = rows.filter(function(r) { return isActive(r); });

  // 1. Renewals — active only, next renewal on or before report date
  var renewalRows = activeRows.filter(function(r) {
    var d = pd(fv(r, "Next Renewal Date", "Next Renewal"));
    return d && d <= ref;
  });
  var renewalTypes = {};
  renewalRows.forEach(function(r) {
    var policy = fv(r, "Renewal Policy", "policy") || "";
    var m = policy.match(/(\d+)\/(\d+)/);
    var type = m ? (m[1] + "mo") : "Other";
    var isH = fv(r, "Client Status", "status").toLowerCase().indexOf("hosting") !== -1;
    var key = isH ? (type + " Hosting") : type;
    renewalTypes[key] = (renewalTypes[key] || 0) + 1;
  });

  // 2. Terminations — ALL rows, filtered to report month
  var termRows = rows.filter(function(r) {
    var d = pd(fv(r, "Effective Date of Termination", "Termination Date"));
    return d && d.getMonth() === rm && d.getFullYear() === ry;
  });
  var termTypes = {};
  termRows.forEach(function(r) {
    var reason = fv(r, "Termination Reason", "Lost To", "reason") || fv(r, "Client Status", "status") || "Unknown";
    termTypes[reason] = (termTypes[reason] || 0) + 1;
  });

  // 4. Support — active only
  var pastDeadline = 0, onePerWeek = 0, supportPackage = 0, bankedHours = 0;
  activeRows.forEach(function(r) {
    var s = fv(r, "Support Call Status", "Support Status").toLowerCase();
    var dl = pd(fv(r, "Last Support Deadline Date", "Support Deadline"));
    if (dl && dl < ref) pastDeadline++;
    if (s.indexOf("1 time per week") !== -1 || s.indexOf("one time per week") !== -1) onePerWeek++;
    if (s.indexOf("support package") !== -1) supportPackage++;
    if (s.indexOf("banked") !== -1) bankedHours++;
  });

  // 5. Client breakdown — active only
  var regular = activeRows.filter(function(r) { return fv(r, "Client Status", "status").toLowerCase() === "active"; });
  var hosting = activeRows.filter(function(r) { return fv(r, "Client Status", "status").toLowerCase().indexOf("hosting only") !== -1; });
  var impl = activeRows.filter(function(r) { return fv(r, "Client Status", "status").toLowerCase().indexOf("implementation") !== -1; });

  var byProg={}, bySt={}, hProg={}, hSt={}, iProg={}, iSt={};
  activeRows.forEach(function(r) {
    var s = fv(r, "Client Status", "status").toLowerCase();
    var isHosting = s.indexOf("hosting only") !== -1;
    var isImpl = s.indexOf("implementation") !== -1;
    var isRegular = !isHosting && !isImpl;
    var progs = fv(r, "Program Type(s)", "Program Types", "Program Type").split(";");
    var states = fv(r, "State(s)", "States", "State").split(";");
    progs.forEach(function(p) {
      p = p.trim(); if (!p) return;
      if (isRegular) byProg[p] = (byProg[p]||0)+1;
      if (isHosting) hProg[p] = (hProg[p]||0)+1;
      if (isImpl)    iProg[p] = (iProg[p]||0)+1;
    });
    states.forEach(function(st) {
      st = st.trim(); if (!st) return;
      if (isRegular) bySt[st] = (bySt[st]||0)+1;
      if (isHosting) hSt[st]  = (hSt[st]||0)+1;
      if (isImpl)    iSt[st]  = (iSt[st]||0)+1;
    });
  });

  // 8. Caseloads — active only
  var caseloads = {};
  activeRows.forEach(function(r) {
    var rep = fv(r, "Primary Account Rep", "Account Rep", "Rep") || "Unknown";
    var s = fv(r, "Client Status", "status").toLowerCase();
    if (!caseloads[rep]) caseloads[rep] = {hosting:0, regular:0, handoff:0};
    if (s.indexOf("hosting") !== -1) caseloads[rep].hosting++;
    else caseloads[rep].regular++;
  });
  activeRows.forEach(function(r) {
    var rep = fv(r, "Primary Account Rep", "Account Rep", "Rep") || "Unknown";
    var ho = fv(r, "Implementation Hand-off Date", "Estimated Hand-off", "Hand-off Date");
    if (ho && caseloads[rep]) caseloads[rep].handoff++;
  });

  return {
    renewals: {rows: renewalRows, types: renewalTypes},
    terminations: {rows: termRows, types: termTypes},
    support: {pastDeadline:pastDeadline, onePerWeek:onePerWeek, supportPackage:supportPackage, bankedHours:bankedHours},
    clients: {total: regular.length + impl.length, hosting: hosting.length, impl: impl.length, byProg:byProg, bySt:bySt, hProg:hProg, hSt:hSt, iProg:iProg, iSt:iSt},
    caseloads: caseloads
  };
}

// ── Render ────────────────────────────────────────────────────────────────────
function mkRow(label, value, indent) {
  return '<div class="row' + (indent ? ' indent' : '') + '"><span class="lbl">' + label + '</span><span class="val">' + value + '</span></div>';
}
function subhead(t) { return '<div class="subhead">' + t + '</div>'; }
function mkSection(num, title, body) {
  return '<div class="section"><div class="sec-header">' + num + '. ' + title + '</div><div class="sec-body">' + body + '</div></div>';
}
function objRows(obj, indent) {
  var entries = Object.keys(obj).map(function(k) { return [k, obj[k]]; });
  entries.sort(function(a,b) { return b[1]-a[1]; });
  if (!entries.length) return '<div class="none">—</div>';
  return entries.map(function(e) { return mkRow(e[0], e[1], indent); }).join("");
}
function clientList(rows, repKey, reasonKey) {
  if (!rows.length) return '<div class="none">None for this period</div>';
  return rows.map(function(r) {
    var name = fv(r, "Organization Name", "name");
    var detail = repKey ? fv(r, repKey) : (fv(r, "Termination Reason", "Lost To", "reason") || fv(r, "Client Status", "status"));
    return '<div class="client-item">• ' + name + (detail ? ' <span>(' + detail + ')</span>' : '') + '</div>';
  }).join("");
}

function renderSummary(r) {
  var html = "";

  // 1. Renewals
  var renewalTypeStr = Object.keys(r.renewals.types).map(function(k) { return r.renewals.types[k] + " " + k; }).join(", ") || "—";
  html += mkSection(1, "Renewals",
    mkRow("Total Clients Renewed", r.renewals.rows.length + " Clients") +
    mkRow("Renewal Type(s)", renewalTypeStr) +
    subhead("Renewal Clients") +
    clientList(r.renewals.rows, "Primary Account Rep"));

  // 2. Terminations
  var termTypeStr = Object.keys(r.terminations.types).length
    ? Object.keys(r.terminations.types).map(function(k) { return k + (r.terminations.types[k] > 1 ? " (" + r.terminations.types[k] + ")" : ""); }).join("; ")
    : "NA";
  html += mkSection(2, "Terminations",
    mkRow("Total Clients Terminated", r.terminations.rows.length) +
    mkRow("Termination Type(s)", termTypeStr) +
    subhead("Termination Clients") +
    clientList(r.terminations.rows, null));

  // 4. Support
  html += mkSection(4, "Support",
    mkRow("Clients Past Support Deadline", r.support.pastDeadline) +
    mkRow("1 Time Per Week", r.support.onePerWeek) +
    mkRow("Support Package", r.support.supportPackage) +
    mkRow("Banked Hours", r.support.bankedHours));

  // 5. Client Breakdown
  html += mkSection(5, "Client Breakdown",
    mkRow("Total Clients - Active", r.clients.total) +
    mkRow("Total Clients - Hosting", r.clients.hosting) +
    mkRow("Total Clients - Implementations", r.clients.impl) +
    subhead("Active by Program") + objRows(r.clients.byProg, true) +
    subhead("Active by State") + objRows(r.clients.bySt, true) +
    subhead("Hosting by Program") + objRows(r.clients.hProg, true) +
    subhead("Hosting by State") + objRows(r.clients.hSt, true) +
    subhead("Implementations by Program") + objRows(r.clients.iProg, true) +
    subhead("Implementations by State") + objRows(r.clients.iSt, true));

  // 8. Caseloads
  var caseHTML = Object.keys(r.caseloads).sort().map(function(rep) {
    var c = r.caseloads[rep];
    var val = (c.hosting > 0 ? c.hosting + " Hosting, " : "") + c.regular + " Regular, " + c.handoff + " for Handoff";
    return mkRow(rep, val);
  }).join("");
  html += mkSection(8, "Caseloads", caseHTML);

  return html;
}

// ── Generate ──────────────────────────────────────────────────────────────────
function generate() {
  document.getElementById("errorMsg").textContent = "";
  var csv = document.getElementById("csvInput").value;
  var rd = document.getElementById("reportDate").value.trim();
  if (!csv.trim()) { document.getElementById("errorMsg").textContent = "⚠ Please paste your CSV data first."; return; }
  if (!rd) { document.getElementById("errorMsg").textContent = "⚠ Please enter a report date."; return; }
  var parsed = parseCSV(csv);
  if (!parsed.rows.length) { document.getElementById("errorMsg").textContent = "⚠ No data rows found — make sure you include the header row."; return; }
  G = analyze(parsed.rows, rd);
  G_date = rd;
  document.getElementById("summaryTitle").innerHTML = "Summary — " + rd + ' <small style="font-size:12px;color:#888;margin-left:8px;">' + parsed.rows.length + ' rows processed</small>';
  document.getElementById("summaryContent").innerHTML = renderSummary(G);
  document.getElementById("inputPanel").style.display = "none";
  document.getElementById("summaryPanel").style.display = "block";
  window.scrollTo(0, 0);
}

function reset() {
  G = null; G_date = "";
  document.getElementById("csvInput").value = "";
  document.getElementById("reportDate").value = "";
  document.getElementById("detectHint").textContent = "";
  document.getElementById("errorMsg").textContent = "";
  document.getElementById("inputPanel").style.display = "block";
  document.getElementById("summaryPanel").style.display = "none";
}

document.addEventListener("DOMContentLoaded", function() {
  document.getElementById("csvInput").addEventListener("input", function() {
    var parsed = parseCSV(this.value);
    var hint = document.getElementById("detectHint");
    hint.innerHTML = parsed.rows.length > 0 ? '<span class="ok">✓ ' + parsed.rows.length + ' rows detected</span>' : "";
  });
});

// ── Export helpers ────────────────────────────────────────────────────────────
function dl(content, filename, mime) {
  var blob = new Blob([content], {type: mime});
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function safeDateStr() { return G_date.replace(/\//g, "-"); }

function buildPlainText() {
  var r = G, lines = ["CS DEPARTMENT SUMMARY — " + G_date, "==================================================", ""];
  lines.push("1. RENEWALS", "------------------------------");
  lines.push("Total Clients Renewed: " + r.renewals.rows.length);
  lines.push("Renewal Type(s): " + (Object.keys(r.renewals.types).map(function(k){return r.renewals.types[k]+" "+k;}).join(", ")||"—"));
  lines.push("Renewal Clients:");
  r.renewals.rows.forEach(function(row){lines.push("  • "+fv(row,"Organization Name","name")+" ("+fv(row,"Primary Account Rep","Account Rep")+")");});
  lines.push("");
  lines.push("2. TERMINATIONS", "------------------------------");
  lines.push("Total Terminated: " + r.terminations.rows.length);
  lines.push("Type(s): " + (Object.keys(r.terminations.types).length ? Object.keys(r.terminations.types).map(function(k){return k+(r.terminations.types[k]>1?" ("+r.terminations.types[k]+")":"");}).join("; ") : "NA"));
  r.terminations.rows.forEach(function(row){lines.push("  • "+fv(row,"Organization Name","name")+" ("+(fv(row,"Termination Reason","Lost To","reason")||fv(row,"Client Status","status"))+")");});
  lines.push("");
  lines.push("4. SUPPORT", "------------------------------");
  lines.push("Past Support Deadline: "+r.support.pastDeadline);
  lines.push("1 Time Per Week: "+r.support.onePerWeek);
  lines.push("Support Package: "+r.support.supportPackage);
  lines.push("Banked Hours: "+r.support.bankedHours);
  lines.push("");
  lines.push("5. CLIENT BREAKDOWN", "------------------------------");
  lines.push("Total Active: "+r.clients.total+"  |  Hosting: "+r.clients.hosting+"  |  Implementations: "+r.clients.impl);
  lines.push("By Program:"); Object.keys(r.clients.byProg).forEach(function(k){lines.push("  "+k+": "+r.clients.byProg[k]);});
  lines.push("By State:"); Object.keys(r.clients.bySt).forEach(function(k){lines.push("  "+k+": "+r.clients.bySt[k]);});
  lines.push("");
  lines.push("8. CASELOADS", "------------------------------");
  Object.keys(r.caseloads).sort().forEach(function(rep){var c=r.caseloads[rep];lines.push(rep+": "+(c.hosting>0?c.hosting+" Hosting, ":"")+c.regular+" Regular, "+c.handoff+" for Handoff");});
  return lines.join("\n");
}

function buildTableText() {
  var r = G;
  var rows = [["Section","Item","Value","Detail"], ["","Report Date",G_date,""]];
  rows.push(["1. Renewals","Total Renewed",r.renewals.rows.length,""]);
  rows.push(["","Renewal Types",Object.keys(r.renewals.types).map(function(k){return r.renewals.types[k]+" "+k;}).join(", ")||"—",""]);
  r.renewals.rows.forEach(function(row){rows.push(["","Client",fv(row,"Organization Name","name"),fv(row,"Primary Account Rep","Account Rep")]);});
  rows.push(["2. Terminations","Total Terminated",r.terminations.rows.length,""]);
  rows.push(["","Types",Object.keys(r.terminations.types).length?Object.keys(r.terminations.types).map(function(k){return k+(r.terminations.types[k]>1?" ("+r.terminations.types[k]+")":"");}).join("; "):"NA",""]);
  r.terminations.rows.forEach(function(row){rows.push(["","Client",fv(row,"Organization Name","name"),fv(row,"Termination Reason","Lost To","reason")||fv(row,"Client Status","status")]);});
  rows.push(["4. Support","Past Deadline",r.support.pastDeadline,""]);
  rows.push(["","1x/Week",r.support.onePerWeek,""]);
  rows.push(["","Support Package",r.support.supportPackage,""]);
  rows.push(["","Banked Hours",r.support.bankedHours,""]);
  rows.push(["5. Clients","Total Active",r.clients.total,""]);
  rows.push(["","Hosting",r.clients.hosting,""]);
  rows.push(["","Implementations",r.clients.impl,""]);
  Object.keys(r.clients.byProg).forEach(function(k){rows.push(["","Program: "+k,r.clients.byProg[k],""]);});
  Object.keys(r.clients.bySt).forEach(function(k){rows.push(["","State: "+k,r.clients.bySt[k],""]);});
  Object.keys(r.caseloads).sort().forEach(function(rep){var c=r.caseloads[rep];rows.push(["8. Caseloads",rep,(c.hosting>0?c.hosting+" Hosting, ":"")+c.regular+" Regular, "+c.handoff+" for Handoff",""]);});
  return rows.map(function(r){return r.join("\t");}).join("\n");
}

function buildCSVData() {
  var r = G;
  var rows = [["Section","Item","Value","Detail"]];
  rows.push(["","Report Date",G_date,""]);
  rows.push(["1. Renewals","Total Renewed",r.renewals.rows.length,""]);
  rows.push(["","Renewal Types",Object.keys(r.renewals.types).map(function(k){return r.renewals.types[k]+" "+k;}).join(", ")||"—",""]);
  r.renewals.rows.forEach(function(row){rows.push(["","Client",fv(row,"Organization Name","name"),fv(row,"Primary Account Rep","Account Rep")]);});
  rows.push(["2. Terminations","Total Terminated",r.terminations.rows.length,""]);
  rows.push(["","Types",Object.keys(r.terminations.types).length?Object.keys(r.terminations.types).map(function(k){return k+(r.terminations.types[k]>1?" ("+r.terminations.types[k]+")":"");}).join("; "):"NA",""]);
  r.terminations.rows.forEach(function(row){rows.push(["","Client",fv(row,"Organization Name","name"),fv(row,"Termination Reason","Lost To","reason")||fv(row,"Client Status","status")]);});
  rows.push(["4. Support","Past Deadline",r.support.pastDeadline,""]);
  rows.push(["","1x/Week",r.support.onePerWeek,""]);
  rows.push(["","Support Package",r.support.supportPackage,""]);
  rows.push(["","Banked Hours",r.support.bankedHours,""]);
  rows.push(["5. Clients","Total Active",r.clients.total,""]);
  rows.push(["","Hosting",r.clients.hosting,""]);
  rows.push(["","Implementations",r.clients.impl,""]);
  Object.keys(r.clients.byProg).forEach(function(k){rows.push(["","Program: "+k,r.clients.byProg[k],""]);});
  Object.keys(r.clients.bySt).forEach(function(k){rows.push(["","State: "+k,r.clients.bySt[k],""]);});
  Object.keys(r.caseloads).sort().forEach(function(rep){var c=r.caseloads[rep];rows.push(["8. Caseloads",rep,(c.hosting>0?c.hosting+" Hosting, ":"")+c.regular+" Regular, "+c.handoff+" for Handoff",""]);});
  return rows.map(function(row){return row.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(",");}).join("\n");
}

function buildPrintHTML() {
  var r = G;
  var sections = "";
  // helper
  function tr(l,v,i){return "<tr"+(i?' class="indent"':'')+"><td class='label'>"+l+"</td><td class='val'>"+v+"</td></tr>";}
  function sh(t){return "<div class='subhead'>"+t+"</div>";}
  function otr(obj){var e=Object.keys(obj).map(function(k){return[k,obj[k]];}).sort(function(a,b){return b[1]-a[1];});return e.length?e.map(function(x){return tr(x[0],x[1],true);}).join(""):"<tr><td colspan='2' style='color:#aaa'>—</td></tr>";}
  // renewals
  var rtypes = Object.keys(r.renewals.types).map(function(k){return r.renewals.types[k]+" "+k;}).join(", ")||"—";
  sections += "<div class='section'><div class='sec-header'>1. Renewals</div><div class='sec-body'><table>"+tr("Total Clients Renewed",r.renewals.rows.length+" Clients")+tr("Renewal Type(s)",rtypes)+"</table>"+sh("Renewal Clients")+r.renewals.rows.map(function(row){return "<div class='cl'>• "+fv(row,"Organization Name","name")+" <span style='color:#999'>("+fv(row,"Primary Account Rep","Account Rep")+")</span></div>";}).join("")+"</div></div>";
  // terminations
  var ttypes = Object.keys(r.terminations.types).length?Object.keys(r.terminations.types).map(function(k){return k+(r.terminations.types[k]>1?" ("+r.terminations.types[k]+")":"");}).join("; "):"NA";
  sections += "<div class='section'><div class='sec-header'>2. Terminations</div><div class='sec-body'><table>"+tr("Total Terminated",r.terminations.rows.length)+tr("Type(s)",ttypes)+"</table>"+sh("Termination Clients")+r.terminations.rows.map(function(row){return "<div class='cl'>• "+fv(row,"Organization Name","name")+" <span style='color:#999'>("+(fv(row,"Termination Reason","Lost To","reason")||fv(row,"Client Status","status"))+")</span></div>";}).join("")+"</div></div>";
  // support
  sections += "<div class='section'><div class='sec-header'>4. Support</div><div class='sec-body'><table>"+tr("Past Support Deadline",r.support.pastDeadline)+tr("1 Time Per Week",r.support.onePerWeek)+tr("Support Package",r.support.supportPackage)+tr("Banked Hours",r.support.bankedHours)+"</table></div></div>";
  // clients
  sections += "<div class='section'><div class='sec-header'>5. Client Breakdown</div><div class='sec-body'><table>"+tr("Total Active",r.clients.total)+tr("Hosting",r.clients.hosting)+tr("Implementations",r.clients.impl)+"</table>"+sh("By Program")+"<table>"+otr(r.clients.byProg)+"</table>"+sh("By State")+"<table>"+otr(r.clients.bySt)+"</table>"+sh("Hosting by Program")+"<table>"+otr(r.clients.hProg)+"</table>"+sh("Implementations by Program")+"<table>"+otr(r.clients.iProg)+"</table></div></div>";
  // caseloads
  var crows = Object.keys(r.caseloads).sort().map(function(rep){var c=r.caseloads[rep];return tr(rep,(c.hosting>0?c.hosting+" Hosting, ":"")+c.regular+" Regular, "+c.handoff+" for Handoff");}).join("");
  sections += "<div class='section'><div class='sec-header'>8. Caseloads</div><div class='sec-body'><table>"+crows+"</table></div></div>";

  return "<!DOCTYPE html><html><head><meta charset='utf-8'><title>CS Summary "+G_date+"</title><style>body{font-family:system-ui,sans-serif;max-width:800px;margin:40px auto;padding:20px;color:#111;}h1{color:#1a2e5a;font-size:22px;}p.sub{color:#888;font-size:13px;margin-bottom:24px;}.section{margin-bottom:20px;border:1px solid #dde;border-radius:8px;overflow:hidden;}.sec-header{background:#1a2e5a;color:#fff;padding:10px 16px;font-weight:700;font-size:14px;}.sec-body{padding:14px 16px;}table{width:100%;border-collapse:collapse;}tr{border-bottom:1px solid #f0f0f0;}td{padding:5px 4px;font-size:13px;}td.label{color:#444;width:65%;}td.val{font-weight:700;text-align:right;}tr.indent td.label{padding-left:20px;color:#666;}.subhead{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;margin:10px 0 4px;}.cl{font-size:13px;color:#555;padding:2px 0;border-bottom:1px solid #f5f5f5;}button{margin-top:16px;padding:10px 24px;background:#1a2e5a;color:#fff;border:none;border-radius:7px;font-size:14px;cursor:pointer;}@media print{button{display:none;}}</style></head><body><h1>CS Department Summary</h1><p class='sub'>Report Date: "+G_date+" &nbsp;|&nbsp; Generated: "+new Date().toLocaleDateString()+"</p>"+sections+"<button onclick='window.print()'>🖨 Print / Save as PDF</button></body></html>";
}

function downloadText(){ dl(buildPlainText(), "CS-Summary-"+safeDateStr()+".txt", "text/plain"); }
function downloadTable(){ dl(buildTableText(), "CS-Summary-"+safeDateStr()+".tsv", "text/tab-separated-values"); }
function downloadCSV(){ dl(buildCSVData(), "CS-Summary-"+safeDateStr()+".csv", "text/csv"); }
function downloadPDF(){
  var blob = new Blob([buildPrintHTML()], {type:"text/html"});
  window.open(URL.createObjectURL(blob), "_blank");
}
</script>
